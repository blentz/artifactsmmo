name: lint-gate
# Runs ruff (bug-finder ruleset) on src/. Catches new regressions
# in B/SIM/RUF/F/I/UP/E/W families.

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "pyproject.toml"

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --dev
      - name: ruff check ai/ (strict — bug-finder rules)
        run: uv run ruff check src/artifactsmmo_cli/ai/ --select B007,SIM110,SIM115,RUF005,RUF059
