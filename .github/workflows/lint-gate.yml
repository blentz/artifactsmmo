name: lint-gate
on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "openapi.json"
      - ".github/workflows/lint-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "openapi.json"
      - ".github/workflows/lint-gate.yml"
  workflow_dispatch: {}

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      - name: ruff check ai/ (strict — bug-finder rules)
        run: uv run ruff check src/artifactsmmo_cli/ai/ --select B007,SIM110,SIM115,RUF005,RUF059
