name: mutation-gate
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}
  pull_request:
    paths:
      - "src/artifactsmmo_cli/ai/**"
      - "formal/diff/**"
      - "openapi.json"
      - ".github/workflows/mutation-gate.yml"
jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      # mutate.py runs die to runner OOM (peak ~22GB locally vs 16GB runner);
      # unbuffered output makes the post-mortem log show which mutation group
      # was running when the runner is killed.
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      - name: Snapshot src/ baseline
        run: |
          git diff --quiet src/ || (echo "src/ dirty before mutation run — aborting" && exit 1)
      - name: Run mutation gate
        run: |
          set -euxo pipefail
          uv run python formal/diff/mutate.py
      - name: Leak fail-fast — src/ must be clean after run
        run: |
          if ! git diff --quiet src/; then
            echo "::error::mutate.py leaked a mutation into src/."
            git diff src/ | head -200
            git checkout -- src/
            exit 1
          fi
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: |
            formal/diff/mutation_*.log
            formal/diff/survivors_*.txt
          if-no-files-found: ignore
