name: pytest
# Runs the full test suite on every push + PR. pyproject addopts already
# enforce -W error and --cov-fail-under=100; CLAUDE.md mandates 0 errors,
# 0 warnings, 0 skipped, 100% coverage.

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "openapi.json"
      - ".github/workflows/pytest.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "openapi.json"
      - ".github/workflows/pytest.yml"
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      - name: pytest (full suite, 100% coverage gate)
        run: uv run pytest
