name: pytest
# Runs the full test suite on every push + PR. pyproject addopts already
# enforce -W error and --cov-fail-under=100; CLAUDE.md mandates 0 errors,
# 0 warnings, 0 skipped, 100% coverage.

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "openapi.json"
      - ".github/workflows/pytest.yml"
      - "scripts/run_tests.sh"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - "uv.lock"
      - "openapi.json"
      - ".github/workflows/pytest.yml"
      - "scripts/run_tests.sh"
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      # The suite is fully stubbed (no live API calls), but CLI init requires
      # a token string to exist; locally the gitignored TOKEN file provides it.
      ARTIFACTSMMO_TOKEN: "ci-dummy-token"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      - name: pytest (two-lane parallel runner, 100% coverage gate)
        # Plain `uv run pytest` runs fully serial and was timing out: the
        # inventory census alone dominated the suite. run_tests.sh parallelizes
        # the bulk with -n auto and runs the census + wall-clock scenarios in a
        # serial lane, combining coverage to enforce the 100% gate.
        run: bash scripts/run_tests.sh
