name: formal-gate
on:
  pull_request:
    paths:
      - "formal/**"
      - "src/artifactsmmo_cli/utils/pathfinding.py"
      - "src/artifactsmmo_cli/ai/game_data.py"
      - "openapi.json"
      - ".github/workflows/formal-gate.yml"
  push:
    branches: [main]
    paths:
      - "formal/**"
      - "src/artifactsmmo_cli/utils/pathfinding.py"
      - "src/artifactsmmo_cli/ai/game_data.py"
      - "openapi.json"
jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (Lean)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps
        run: uv sync --dev
      - name: Run the formal gate
        run: ./formal/gate.sh
      - name: OpenAPI conformance (strict)
        run: uv run python formal/diff/openapi_conformance.py --strict
