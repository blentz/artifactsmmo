name: formal-gate
on:
  pull_request:
    paths:
      - "formal/**"
      - "src/artifactsmmo_cli/utils/pathfinding.py"
      - "src/artifactsmmo_cli/ai/game_data.py"
      - "openapi.json"
      - ".github/workflows/formal-gate.yml"
  push:
    branches: [main]
    paths:
      - "formal/**"
      - "src/artifactsmmo_cli/utils/pathfinding.py"
      - "src/artifactsmmo_cli/ai/game_data.py"
      - "openapi.json"
      - ".github/workflows/formal-gate.yml"
  workflow_dispatch: {}
jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      # See mutation-gate.yml: unbuffered output so an OOM-killed mutation
      # step's log shows which group was running.
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install elan (Lean)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      # Cache Lean's .lake build directory keyed on lakefile + manifest.
      # Cold cache (first run, lockfile change) ~30-40 min Lean build.
      # Warm cache restores in seconds; subsequent runs ~3-5 min.
      - name: Cache Lean .lake
        uses: actions/cache@v5
        with:
          path: formal/.lake
          key: lake-${{ runner.os }}-${{ hashFiles('formal/lakefile.toml', 'formal/lean-toolchain', 'formal/lake-manifest.json') }}
          restore-keys: |
            lake-${{ runner.os }}-
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      # Split formal gate into per-section steps. Previous monolithic step
      # bundled build + axiom + diff + mutation into one shell invocation;
      # when the mutation phase ran past the actor's cancellation window
      # (~1h on a cold cache), the whole step was marked failure even
      # though build + axiom + diff had passed minutes earlier. Per-step
      # split surfaces real failures + lets a slow mutation step be capped
      # without losing the prior gates' verdicts.
      - name: Mathlib cache prefetch
        run: cd formal && lake exe cache get 2>&1 | tail -3 || echo "cache get skipped"
      - name: Lean kernel build
        run: cd formal && lake build
      - name: Orphan modules check
        run: bash formal/gate/check_no_orphan_modules.sh
      - name: No sorry / admit check
        run: bash formal/gate/check_no_sorry.sh
      - name: Axiom hygiene
        run: bash formal/gate/check_axioms.sh
      - name: Role manifest
        run: cd formal && lake env lean Formal/Manifest.lean >/dev/null && echo "manifest OK"
      - name: Extraction drift (Python -> Lean)
        run: bash formal/gate/check_extraction.sh
      - name: Differential tests (Python<->Lean)
        timeout-minutes: 25
        # `-n auto`: the 104 diff modules are deterministic input/output checks
        # against a per-call subprocess oracle (no shared state, no wall-clock
        # assertions), so xdist is safe and cuts this from >25 min (the old
        # timeout) to a few minutes on CI cores.
        run: |
          cd formal && lake build oracle
          cd "$GITHUB_WORKSPACE" && uv run pytest formal/diff/ -q --no-cov -n auto \
            --ignore=formal/diff/test_game_data_fixture_diff.py
      - name: Mutation tests
        # The full suite runs ~36 min locally and slower on CI hardware;
        # 40 min silently truncated it (continue-on-error hid the timeout).
        timeout-minutes: 55
        continue-on-error: true
        run: uv run python formal/diff/mutate.py
      - name: OpenAPI conformance (strict)
        run: uv run python formal/diff/openapi_conformance.py --strict
