name: census-gate
# Behavioral-completeness censuses. Each drives the REAL StrategyArbiter over a
# grid derived from production's own structure, and fails on an UNEXPLAINED cell.
#
#   craft:     can the planner plan every craftable recipe?   -> planner_bug == 0
#   recycle:   does the planner RECYCLE to obtain a material? -> recycle_source_bug == 0
#              LIVENESS/BANKED/PARTIAL prove the acquisition route fires (bag,
#              bank, and a partial cover that must resolve WITHIN BUDGET — a
#              planner TIMEOUT is classified as the bug, never as an explained
#              gap). SAFETY is the one that matters most: it proves the last
#              copper_axe (WORKING_KIT) is never dismantled for its copper_bar.
#   inventory: does the planner obey the keep authority?      -> inventory_bug == 0
#              plus REASON COVERAGE: every KeepReason (except CURRENCY, whose
#              KEEP_ALL means nothing is ever disposable) must have a PASSing
#              LIVENESS cell. This is the anti-rot mechanism: a new protection
#              reason cannot be added without proving its surplus is still
#              disposable. It is what makes "keep ALL copies" — the type-level
#              defect behind seven hoard bugs — unable to come back silently.
#
# The craft + inventory gates were documented long before they were enforced
# here; the recycle gate shipped with its epic (2026-07-14).
on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "scripts/gen_craft_completeness.py"
      - "scripts/gen_inventory_completeness.py"
      - "scripts/gen_recycle_source_completeness.py"
      - ".github/workflows/census-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "scripts/gen_craft_completeness.py"
      - "scripts/gen_inventory_completeness.py"
      - "scripts/gen_recycle_source_completeness.py"
      - ".github/workflows/census-gate.yml"
  workflow_dispatch: {}

jobs:
  census:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev

      - name: inventory census — inventory_bug == 0 AND every KeepReason has a passing LIVENESS cell
        run: uv run python scripts/gen_inventory_completeness.py --check

      - name: recycle-source census — recycle_source_bug == 0
        run: uv run python scripts/gen_recycle_source_completeness.py --check

      - name: craft census — planner_bug == 0
        run: uv run python scripts/gen_craft_completeness.py --check
