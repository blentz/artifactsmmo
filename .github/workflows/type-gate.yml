name: type-gate
# Runs mypy strict on every push + PR. CLAUDE.md mandates 0 errors,
# 0 warnings; this workflow enforces it. A new strict-mode regression
# fails the PR before it can merge.

on:
  pull_request:
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "openapi.json"
      - ".github/workflows/type-gate.yml"
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "pyproject.toml"
      - "openapi.json"

jobs:
  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Generate artifactsmmo-api-client
        run: |
          set -euxo pipefail
          # openapi-python-client is a uv dep but uv sync needs the
          # generated client present first. Bootstrap via pip.
          pip install openapi-python-client
          bash generate_openapi_client.sh
      - name: Sync deps
        run: uv sync --dev
      - name: mypy strict
        run: uv run mypy src/
