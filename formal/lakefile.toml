name = "Formal"
defaultTargets = ["Formal", "oracle"]

# Mathlib is pinned to the release tag matching lean-toolchain (Lean 4.30.0).
# Quarantined to Formal/Liveness/ — see Formal/Liveness/README.md.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "Formal"

[[lean_exe]]
name = "oracle"
root = "Oracle"
